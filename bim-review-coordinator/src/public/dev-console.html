<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BIM Review 協作控制台</title>
  <style>
    body { margin: 0; font-family: system-ui, Segoe UI, sans-serif; background: #f6f8fb; color: #1f2933; }
    header { padding: 16px 24px; background: #102a43; color: #fff; }
    main { display: grid; grid-template-columns: minmax(420px, 560px) 1fr; gap: 16px; padding: 16px; }
    section { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 14px; }
    label { display: block; margin: 10px 0 4px; font-size: 12px; font-weight: 700; text-transform: uppercase; color: #52606d; }
    input, textarea { width: 100%; box-sizing: border-box; border: 1px solid #bcccdc; border-radius: 6px; padding: 8px; font: inherit; }
    textarea { min-height: 130px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; }
    button, a.button { display: inline-flex; align-items: center; margin: 6px 6px 0 0; padding: 8px 10px; border: 1px solid #9fb3c8; border-radius: 6px; background: #fff; color: #102a43; cursor: pointer; text-decoration: none; font: inherit; }
    button.primary { background: #0f609b; color: #fff; border-color: #0f609b; }
    pre { min-height: 250px; margin: 0; white-space: pre-wrap; word-break: break-word; font-size: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .status { display: inline-flex; min-width: 92px; padding: 4px 8px; border-radius: 999px; background: #f0f4f8; color: #334e68; }
  </style>
</head>
<body>
  <header>
    <h1>BIM Review 協作控制台</h1>
    <p>用瀏覽器手動觸發 review session HTTP API 與 Socket.IO /review 多人協作事件。</p>
  </header>
  <main>
    <section>
      <div class="grid">
        <div>
          <label for="projectId">project_id</label>
          <input id="projectId" value="project_demo_001" />
        </div>
        <div>
          <label for="modelVersionId">model_version_id</label>
          <input id="modelVersionId" value="version_demo_001" />
        </div>
      </div>
      <div class="grid">
        <div>
          <label for="sessionId">session_id</label>
          <input id="sessionId" placeholder="建立 session 後會自動填入" />
        </div>
        <div>
          <label for="userId">user_id</label>
          <input id="userId" value="dev_user_001" />
        </div>
      </div>
      <div class="grid">
        <div>
          <label for="displayName">display_name</label>
          <input id="displayName" value="示範使用者" />
        </div>
        <div>
          <label for="mode">mode</label>
          <input id="mode" value="single_kit_shared_state" />
        </div>
      </div>

      <label for="eventBody">event body</label>
      <textarea id="eventBody">{
  "event_type": "manualDemoEvent",
  "actor_id": "dev_user_001",
  "payload": {
    "message": "從 coordinator 協作控制台手動觸發"
  }
}</textarea>

      <h2>HTTP API 手動觸發</h2>
      <button onclick="httpCall('GET', '/health')">健康檢查 GET /health</button>
      <button class="primary" onclick="createSession()">建立 review session POST /api/review-sessions</button>
      <button onclick="getSession()">讀取 session GET session</button>
      <button onclick="joinSessionHttp()">加入 session POST join</button>
      <button onclick="leaveSessionHttp()">離開 session POST leave</button>
      <button onclick="getStreamConfig()">讀取串流設定 GET stream-config</button>
      <button onclick="getEvents()">讀取事件紀錄 GET events</button>
      <button onclick="postEvent()">新增事件紀錄 POST events</button>
      <button onclick="getBootstrap()">讀取 review bootstrap GET review-bootstrap</button>

      <h2>Socket.IO /review</h2>
      <div>連線狀態：<span id="socketState" class="status">未連線</span></div>
      <button class="primary" onclick="connectSocket()">連線 Socket.IO /review</button>
      <button onclick="disconnectSocket()">中斷連線</button>
      <button onclick="emitJoin()">加入房間 joinSession</button>
      <button onclick="emitLeave()">離開房間 leaveSession</button>
      <button onclick="emitHighlight()">送出高亮事件 highlightRequest</button>
      <button onclick="emitSelection()">送出選取事件 selectionUpdate</button>
      <button onclick="emitAnnotation()">建立標註 annotationCreate</button>
      <button onclick="emitHeartbeat()">心跳 heartbeat</button>

      <h2>快速開啟其他控制台</h2>
      <a class="button" href="http://127.0.0.1:8001/ui" target="_blank">開啟假 BIM 資料平台 UI</a>
      <a class="button" href="http://127.0.0.1:8002/ui" target="_blank">開啟假物件儲存 UI</a>
      <a class="button" href="http://127.0.0.1:8003/ui" target="_blank">開啟轉檔服務 UI</a>
      <a class="button" href="http://127.0.0.1:5173" target="_blank">開啟 Web Viewer</a>
      <button onclick="openViewerWithSession()">用目前 session 開啟 Web Viewer</button>
    </section>
    <section>
      <h2>HTTP 回應</h2>
      <pre id="httpOutput">尚未送出請求。</pre>
      <h2>收到的 Socket 事件</h2>
      <pre id="socketOutput">尚未收到 socket 事件。</pre>
    </section>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/dev-console-assets/dev-console.js"></script>
</body>
</html>
